<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EM Studio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #000;
    }
    header {
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid #eee;
      position: fixed;
      width: 100%;
      background: #fff;
    }
    header img {
      height: 60px;
    }
    main {
      padding-top: 120px;
    }
    section {
      padding: 100px 40px;
      text-align: center;
    }
    .gray {
      background: #f6f6f6;
    }
    .black {
      background: #000;
      color: #fff;
    }
    .card {
      background: #fff;
      padding: 30px;
      margin: 30px auto;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .stars {
      color: #f5b301;
      font-size: 20px;
    }
  </style>
</head>
<body>

<header>
  <img src="em-logo.png" alt="EM Logo">
</header>

<main>

<section>
  <h1>Premium Web Design</h1>
  <p>Siti web professionali a 450€ prezzo fisso.</p>
</section>

<section class="gray">
  <h2>Testimonianze</h2>

  <div class="card">
    <p>"Inserisci qui la recensione."</p>
    <strong>Nome Cliente</strong>
    <div class="stars">★★★★★</div>
  </div>

  <div class="card">
    <p>"Seconda recensione."</p>
    <strong>Nome Cliente</strong>
    <div class="stars">★★★★☆</div>
  </div>

</section>

<section class="black">
  <h2>Prezzo Unico</h2>
  <h1>450€</h1>
  <p>Dominio escluso (15–20€ annui)</p>
</section>

</main>

</body>
</html>
